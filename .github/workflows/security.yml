name: Security scan

on:
  pull_request:
    paths:
      - "**.py"
      - ".github/workflows/security.yml"
  schedule:
    # Weekly Monday 08:00 UTC
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  # framework-ai-stack is a configuration repo — no Python source, no executables.
  # Python analysis (CodeQL) lives in the component repos (ragdeck, ragpipe, etc.)
  # Container image scanning (Trivy) also lives in the component repos.
  none:
    name: No security scans applicable
    runs-on: ubuntu-latest
    steps:
      - run: echo "No Python source in framework-ai-stack — security scanning not applicable"
