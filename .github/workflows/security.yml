name: Security scan

on:
  pull_request:
    paths:
      - "**.py"
      - ".github/workflows/security.yml"
  schedule:
    # Weekly Monday 08:00 UTC
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write

# No Python source in framework-ai-stack — CodeQL Python analysis not applicable.
# Container security (Trivy) is handled in the ragdeck repo where the Containerfile lives.
