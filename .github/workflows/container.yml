name: Containerfile lint

# Both ragpipe and ragstuffer Containerfiles are linted in their own repos.
# This workflow is retained as a placeholder for any future local Containerfiles.

on:
  push:
    branches: [main]
    paths:
      - "**/Containerfile"
  pull_request:
    paths:
      - "**/Containerfile"

permissions:
  contents: read

jobs:
  placeholder:
    name: No local Containerfiles
    runs-on: ubuntu-latest
    steps:
      - run: echo "ragpipe and ragstuffer Containerfiles linted in their own repos"
