# LiteLLM config — Qwen3.5-35B-A3B on :8080, RAG proxy on :8090
# All aliases route through the RAG proxy for context-augmented responses

model_list:

  - model_name: default
    litellm_params:
      model: openai/qwen3.5
      api_base: http://127.0.0.1:8090/v1
      api_key: none
      timeout: 300

  - model_name: reasoning
    litellm_params:
      model: openai/qwen3.5
      api_base: http://127.0.0.1:8090/v1
      api_key: none
      timeout: 300

  - model_name: code
    litellm_params:
      model: openai/qwen3.5
      api_base: http://127.0.0.1:8090/v1
      api_key: none
      timeout: 300

  - model_name: fast
    litellm_params:
      model: openai/qwen3.5
      api_base: http://127.0.0.1:8090/v1
      api_key: none
      timeout: 60

  # ── AIMI stub — uncomment when Red Hat image available ───────────────────
  # - model_name: aimi-guarded
  #   litellm_params:
  #     model: openai/qwen3.5
  #     api_base: http://localhost:8090/v1   # AIMI guardrail proxy endpoint
  #     api_key: none
  #     timeout: 300

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 300

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
