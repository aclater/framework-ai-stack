# LiteLLM config — single DeepSeek-R1-70B model on :8080
# All aliases route to the same backend

model_list:

  - model_name: default
    litellm_params:
      model: openai/default
      api_base: http://localhost:8080/v1
      api_key: none
      timeout: 300

  - model_name: reasoning
    litellm_params:
      model: openai/reasoning
      api_base: http://localhost:8080/v1
      api_key: none
      timeout: 300

  - model_name: code
    litellm_params:
      model: openai/code
      api_base: http://localhost:8080/v1
      api_key: none
      timeout: 300

  # ── AIMI stub — uncomment when Red Hat image available ───────────────────
  # - model_name: aimi-guarded
  #   litellm_params:
  #     model: openai/reasoning
  #     api_base: http://localhost:8090/v1   # AIMI guardrail proxy endpoint
  #     api_key: none
  #     timeout: 300

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 300

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
