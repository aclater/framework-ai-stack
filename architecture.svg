<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif;background:transparent">

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { fill: #2C2C2A; }
    .th  { font-size:14px; font-weight:500; }
    .ts  { font-size:12px; font-weight:400; }
    .c-gray-fill   { fill:#F1EFE8; stroke:#5F5E5A; }
    .c-purple-fill { fill:#EEEDFE; stroke:#534AB7; }
    .c-coral-fill  { fill:#FAECE7; stroke:#993C1D; }
    .c-teal-fill   { fill:#E1F5EE; stroke:#0F6E56; }
    .c-blue-fill   { fill:#E6F1FB; stroke:#185FA5; }
    .c-green-fill  { fill:#EAF3DE; stroke:#3B6D11; }
    .c-gray-text   { fill:#444441; }
    .c-purple-text { fill:#3C3489; }
    .c-coral-text  { fill:#712B13; }
    .c-teal-text   { fill:#085041; }
    .c-blue-text   { fill:#0C447C; }
    .c-green-text  { fill:#27500A; }
    .muted         { fill:#888780; }
    @media (prefers-color-scheme:dark) {
      text             { fill:#D3D1C7; }
      .c-gray-fill     { fill:#444441; stroke:#B4B2A9; }
      .c-purple-fill   { fill:#3C3489; stroke:#AFA9EC; }
      .c-coral-fill    { fill:#712B13; stroke:#F0997B; }
      .c-teal-fill     { fill:#085041; stroke:#5DCAA5; }
      .c-blue-fill     { fill:#0C447C; stroke:#85B7EB; }
      .c-green-fill    { fill:#27500A; stroke:#97C459; }
      .c-gray-text     { fill:#D3D1C7; }
      .c-purple-text   { fill:#CECBF6; }
      .c-coral-text    { fill:#F5C4B3; }
      .c-teal-text     { fill:#9FE1CB; }
      .c-blue-text     { fill:#B5D4F4; }
      .c-green-text    { fill:#C0DD97; }
      .muted           { fill:#B4B2A9; }
    }
  </style>
</defs>

<!-- Client tier -->
<rect x="190" y="20" width="300" height="44" rx="8" stroke-width="0.5" class="c-gray-fill"/>
<text class="th c-gray-text" x="340" y="46" text-anchor="middle" dominant-baseline="central">Claude Code / OpenAI clients</text>

<!-- Arrow -->
<line x1="340" y1="64" x2="340" y2="94" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts muted" x="355" y="81" dominant-baseline="central">:4000</text>

<!-- LiteLLM proxy -->
<rect x="190" y="96" width="300" height="56" rx="8" stroke-width="0.5" class="c-purple-fill"/>
<text class="th c-purple-text" x="340" y="118" text-anchor="middle" dominant-baseline="central">LiteLLM proxy</text>
<text class="ts c-purple-text" x="340" y="137" text-anchor="middle" dominant-baseline="central">routing · pinned v1.82.6</text>

<!-- Fan-out arrows -->
<path d="M260 152 L130 204" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M340 152 L340 204" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M420 152 L550 204" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts muted" x="172" y="183" text-anchor="middle">:8080</text>
<text class="ts muted" x="340" y="183" text-anchor="middle">:8081</text>
<text class="ts muted" x="508" y="183" text-anchor="middle">:8082</text>

<!-- RamaLama dashed container -->
<rect x="24" y="190" width="632" height="100" rx="6" fill="none" stroke-dasharray="4 3" stroke-width="0.5" stroke="#888780"/>
<text class="ts muted" x="37" y="188" dominant-baseline="central">RamaLama · ghcr.io/ggml-org/llama.cpp:full-rocm</text>

<!-- Reasoning -->
<rect x="40" y="204" width="180" height="72" rx="8" stroke-width="0.5" class="c-coral-fill"/>
<text class="th c-coral-text" x="130" y="228" text-anchor="middle" dominant-baseline="central">Reasoning</text>
<text class="ts c-coral-text" x="130" y="248" text-anchor="middle" dominant-baseline="central">QwQ-32B Q4_K_M</text>
<text class="ts c-coral-text" x="130" y="264" text-anchor="middle" dominant-baseline="central">19 GB · :8080</text>

<!-- Code -->
<rect x="250" y="204" width="180" height="72" rx="8" stroke-width="0.5" class="c-teal-fill"/>
<text class="th c-teal-text" x="340" y="228" text-anchor="middle" dominant-baseline="central">Code</text>
<text class="ts c-teal-text" x="340" y="248" text-anchor="middle" dominant-baseline="central">Qwen2.5-Coder-32B</text>
<text class="ts c-teal-text" x="340" y="264" text-anchor="middle" dominant-baseline="central">19 GB · :8081</text>

<!-- Fast -->
<rect x="460" y="204" width="180" height="72" rx="8" stroke-width="0.5" class="c-blue-fill"/>
<text class="th c-blue-text" x="550" y="228" text-anchor="middle" dominant-baseline="central">Fast / embed</text>
<text class="ts c-blue-text" x="550" y="248" text-anchor="middle" dominant-baseline="central">Qwen2.5-14B</text>
<text class="ts c-blue-text" x="550" y="264" text-anchor="middle" dominant-baseline="central">9 GB · :8082</text>

<!-- Arrow to GPU -->
<line x1="340" y1="290" x2="340" y2="318" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- GPU layer -->
<rect x="40" y="320" width="600" height="44" rx="8" stroke-width="0.5" class="c-green-fill"/>
<text class="th c-green-text" x="340" y="342" text-anchor="middle" dominant-baseline="central">AMD Ryzen AI Max+ 395 · gfx1151 · ROCm · 128 GB unified memory</text>

<!-- Separator -->
<line x1="40" y1="386" x2="640" y2="386" stroke-dasharray="3 3" stroke-width="0.5" stroke="#888780"/>

<!-- Bottom row -->
<rect x="40"  y="396" width="186" height="54" rx="8" stroke-width="0.5" class="c-gray-fill"/>
<text class="th c-gray-text" x="133" y="417" text-anchor="middle" dominant-baseline="central">Open WebUI</text>
<text class="ts c-gray-text" x="133" y="436" text-anchor="middle" dominant-baseline="central">localhost:3000</text>

<rect x="247" y="396" width="186" height="54" rx="8" stroke-width="0.5" class="c-gray-fill"/>
<text class="th c-gray-text" x="340" y="417" text-anchor="middle" dominant-baseline="central">Models</text>
<text class="ts c-gray-text" x="340" y="436" text-anchor="middle" dominant-baseline="central">~/.local/share/ramalama</text>

<rect x="454" y="396" width="186" height="54" rx="8" stroke-width="0.5" class="c-gray-fill"/>
<text class="th c-gray-text" x="547" y="417" text-anchor="middle" dominant-baseline="central">Config</text>
<text class="ts c-gray-text" x="547" y="436" text-anchor="middle" dominant-baseline="central">~/.config/llm-stack</text>

</svg>
