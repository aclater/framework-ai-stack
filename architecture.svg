<svg width="100%" viewBox="0 0 780 680" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif;background:transparent">

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { fill: #2C2C2A; }
    .th  { font-size:14px; font-weight:600; }
    .ts  { font-size:12px; font-weight:400; }
    .tl  { font-size:11px; font-weight:400; }
    .c-gray-fill    { fill:#F1EFE8; stroke:#5F5E5A; }
    .c-purple-fill  { fill:#EEEDFE; stroke:#534AB7; }
    .c-teal-fill    { fill:#E1F5EE; stroke:#0F6E56; }
    .c-coral-fill   { fill:#FAECE7; stroke:#993C1D; }
    .c-blue-fill    { fill:#E6F1FB; stroke:#185FA5; }
    .c-green-fill   { fill:#EAF3DE; stroke:#3B6D11; }
    .c-sand-fill    { fill:#F5F0E0; stroke:#8B7D56; }
    .c-gray-text    { fill:#444441; }
    .c-purple-text  { fill:#3C3489; }
    .c-teal-text    { fill:#085041; }
    .c-coral-text   { fill:#712B13; }
    .c-blue-text    { fill:#0C447C; }
    .c-green-text   { fill:#27500A; }
    .c-sand-text    { fill:#5C512E; }
    .muted          { fill:#888780; }
    @media (prefers-color-scheme:dark) {
      text              { fill:#D3D1C7; }
      .c-gray-fill      { fill:#444441; stroke:#B4B2A9; }
      .c-purple-fill    { fill:#3C3489; stroke:#AFA9EC; }
      .c-teal-fill      { fill:#085041; stroke:#5DCAA5; }
      .c-coral-fill     { fill:#712B13; stroke:#F0997B; }
      .c-blue-fill      { fill:#0C447C; stroke:#85B7EB; }
      .c-green-fill     { fill:#27500A; stroke:#97C459; }
      .c-sand-fill      { fill:#4A4328; stroke:#C4B882; }
      .c-gray-text      { fill:#D3D1C7; }
      .c-purple-text    { fill:#CECBF6; }
      .c-teal-text      { fill:#9FE1CB; }
      .c-coral-text     { fill:#F5C4B3; }
      .c-blue-text      { fill:#B5D4F4; }
      .c-green-text     { fill:#C0DD97; }
      .c-sand-text      { fill:#D8CFA0; }
      .muted            { fill:#B4B2A9; }
    }
  </style>
</defs>

<!-- Column headers -->
<text class="ts muted" x="210" y="14" text-anchor="middle" dominant-baseline="central">Inference</text>
<text class="ts muted" x="590" y="14" text-anchor="middle" dominant-baseline="central">RAG pipeline</text>

<!-- Client tier -->
<rect x="30" y="28" width="360" height="48" rx="8" stroke-width="0.5" class="c-gray-fill"/>
<text class="th c-gray-text" x="210" y="52" text-anchor="middle" dominant-baseline="central">Claude Code · Open WebUI · clients</text>

<!-- Google Drive -->
<rect x="420" y="28" width="340" height="48" rx="8" stroke-width="0.5" class="c-sand-fill"/>
<text class="th c-sand-text" x="590" y="52" text-anchor="middle" dominant-baseline="central">Google Drive</text>

<!-- Arrow client → LiteLLM -->
<line x1="210" y1="76" x2="210" y2="106" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts muted" x="225" y="93" dominant-baseline="central">:4000</text>

<!-- Arrow Drive → RAG watcher -->
<line x1="590" y1="76" x2="590" y2="106" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- LiteLLM proxy -->
<rect x="30" y="108" width="360" height="60" rx="8" stroke-width="0.5" class="c-purple-fill"/>
<text class="th c-purple-text" x="210" y="130" text-anchor="middle" dominant-baseline="central">LiteLLM proxy</text>
<text class="ts c-purple-text" x="210" y="150" text-anchor="middle" dominant-baseline="central">default · reasoning · code · fast → :8090</text>

<!-- RAG watcher -->
<rect x="420" y="108" width="340" height="60" rx="8" stroke-width="0.5" class="c-sand-fill"/>
<text class="th c-sand-text" x="590" y="130" text-anchor="middle" dominant-baseline="central">RAG watcher</text>
<text class="ts c-sand-text" x="590" y="150" text-anchor="middle" dominant-baseline="central">polls Drive · extracts text · embeds into Qdrant</text>

<!-- Arrow LiteLLM → RAG proxy -->
<line x1="210" y1="168" x2="210" y2="208" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts muted" x="225" y="190" dominant-baseline="central">:8090</text>

<!-- Arrow RAG watcher → Qdrant -->
<line x1="590" y1="168" x2="590" y2="208" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- RAG proxy -->
<rect x="30" y="210" width="360" height="60" rx="8" stroke-width="0.5" class="c-coral-fill"/>
<text class="th c-coral-text" x="210" y="232" text-anchor="middle" dominant-baseline="central">RAG proxy</text>
<text class="ts c-coral-text" x="210" y="252" text-anchor="middle" dominant-baseline="central">Qdrant search · context injection · forwards to model</text>

<!-- Qdrant -->
<rect x="420" y="210" width="340" height="60" rx="8" stroke-width="0.5" class="c-blue-fill"/>
<text class="th c-blue-text" x="590" y="232" text-anchor="middle" dominant-baseline="central">Qdrant</text>
<text class="ts c-blue-text" x="590" y="252" text-anchor="middle" dominant-baseline="central">vector database · :6333 · persistent volume</text>

<!-- Arrow RAG proxy ↔ Qdrant -->
<line x1="390" y1="240" x2="418" y2="240" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Arrow RAG proxy → model -->
<line x1="210" y1="270" x2="210" y2="308" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts muted" x="225" y="291" dominant-baseline="central">:8080</text>

<!-- RamaLama dashed container -->
<rect x="24" y="294" width="378" height="120" rx="6" fill="none" stroke-dasharray="4 3" stroke-width="0.5" stroke="#888780"/>
<text class="tl muted" x="37" y="287" dominant-baseline="central">RamaLama · ROCm</text>

<!-- Qwen model -->
<rect x="42" y="308" width="344" height="92" rx="8" stroke-width="0.5" class="c-teal-fill"/>
<text class="th c-teal-text" x="214" y="332" text-anchor="middle" dominant-baseline="central">Qwen3.5-35B-A3B</text>
<text class="ts c-teal-text" x="214" y="354" text-anchor="middle" dominant-baseline="central">MoE · 3B active params · ~22 GB</text>
<text class="ts c-teal-text" x="214" y="374" text-anchor="middle" dominant-baseline="central">thinking + non-thinking · ctx 131072</text>

<!-- Arrow model → GPU -->
<line x1="210" y1="414" x2="210" y2="444" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- GPU layer -->
<rect x="30" y="446" width="730" height="56" rx="8" stroke-width="0.5" class="c-green-fill"/>
<text class="th c-green-text" x="395" y="468" text-anchor="middle" dominant-baseline="central">AMD Ryzen AI Max+ 395 · gfx1151 · ROCm</text>
<text class="ts c-green-text" x="395" y="488" text-anchor="middle" dominant-baseline="central">64 GB VRAM + 64 GB GTT · 62 GB system RAM</text>

<!-- Separator -->
<line x1="30" y1="522" x2="760" y2="522" stroke-dasharray="3 3" stroke-width="0.5" stroke="#888780"/>

<!-- Bottom row -->
<rect x="30"  y="536" width="170" height="54" rx="8" stroke-width="0.5" class="c-gray-fill"/>
<text class="th c-gray-text" x="115" y="557" text-anchor="middle" dominant-baseline="central">Open WebUI</text>
<text class="ts c-gray-text" x="115" y="576" text-anchor="middle" dominant-baseline="central">v0.8.6 · :3000</text>

<rect x="215" y="536" width="170" height="54" rx="8" stroke-width="0.5" class="c-gray-fill"/>
<text class="th c-gray-text" x="300" y="557" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
<text class="ts c-gray-text" x="300" y="576" text-anchor="middle" dominant-baseline="central">LiteLLM state · :5432</text>

<rect x="400" y="536" width="170" height="54" rx="8" stroke-width="0.5" class="c-gray-fill"/>
<text class="th c-gray-text" x="485" y="557" text-anchor="middle" dominant-baseline="central">Fedora 43</text>
<text class="ts c-gray-text" x="485" y="576" text-anchor="middle" dominant-baseline="central">Podman quadlets</text>

<rect x="585" y="536" width="170" height="54" rx="8" stroke-width="0.5" class="c-gray-fill"/>
<text class="th c-gray-text" x="670" y="557" text-anchor="middle" dominant-baseline="central">systemd</text>
<text class="ts c-gray-text" x="670" y="576" text-anchor="middle" dominant-baseline="central">rootless user services</text>

</svg>
