<!-- Column headers -->
<text class="ts muted" x="210" y="14" text-anchor="middle" dominant-baseline="central">Inference</text>
<text class="ts muted" x="590" y="14" text-anchor="middle" dominant-baseline="central">RAG pipeline</text>

<!-- Client tier -->
<rect x="30" y="28" width="360" height="48" rx="8" stroke-width="0.5" class="c-gray-fill"/>
<text class="th c-gray-text" x="210" y="52" text-anchor="middle" dominant-baseline="central">Claude Code · Open WebUI · clients</text>

<!-- Document sources -->
<rect x="420" y="28" width="340" height="48" rx="8" stroke-width="0.5" class="c-sand-fill"/>
<text class="th c-sand-text" x="590" y="44" text-anchor="middle" dominant-baseline="central">Document sources</text>
<text class="ts c-sand-text" x="590" y="62" text-anchor="middle" dominant-baseline="central">Google Drive · git repos · web URLs</text>

<!-- Arrow client → LiteLLM -->
<line x1="210" y1="76" x2="210" y2="106" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts muted" x="225" y="93" dominant-baseline="central">:4000</text>

<!-- Arrow sources → watcher -->
<line x1="590" y1="76" x2="590" y2="106" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- LiteLLM proxy -->
<rect x="30" y="108" width="360" height="52" rx="8" stroke-width="0.5" class="c-purple-fill"/>
<text class="th c-purple-text" x="210" y="128" text-anchor="middle" dominant-baseline="central">LiteLLM proxy</text>
<text class="ts c-purple-text" x="210" y="146" text-anchor="middle" dominant-baseline="central">default · reasoning · code · fast → :8090</text>

<!-- RAG watcher -->
<rect x="420" y="108" width="340" height="52" rx="8" stroke-width="0.5" class="c-sand-fill"/>
<text class="th c-sand-text" x="590" y="128" text-anchor="middle" dominant-baseline="central">RAG watcher</text>
<text class="ts c-sand-text" x="590" y="146" text-anchor="middle" dominant-baseline="central">extract · chunk · embed · persist</text>

<!-- Arrow LiteLLM → RAG proxy -->
<line x1="210" y1="160" x2="210" y2="190" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts muted" x="225" y="177" dominant-baseline="central">:8090</text>

<!-- Arrow watcher → Qdrant -->
<line x1="540" y1="160" x2="540" y2="190" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="tl muted" x="540" y="177" text-anchor="middle" dominant-baseline="central">vectors</text>

<!-- Arrow watcher → docstore -->
<line x1="640" y1="160" x2="640" y2="190" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="tl muted" x="640" y="177" text-anchor="middle" dominant-baseline="central">text</text>

<!-- RAG proxy box (taller to show pipeline) -->
<rect x="30" y="192" width="360" height="100" rx="8" stroke-width="0.5" class="c-coral-fill"/>
<text class="th c-coral-text" x="210" y="214" text-anchor="middle" dominant-baseline="central">RAG proxy</text>
<text class="ts c-coral-text" x="210" y="234" text-anchor="middle" dominant-baseline="central">1. Qdrant vector search (20 candidates)</text>
<text class="ts c-coral-text" x="210" y="252" text-anchor="middle" dominant-baseline="central">2. Docstore hydration (batch text lookup)</text>
<text class="ts c-coral-text" x="210" y="270" text-anchor="middle" dominant-baseline="central">3. Cross-encoder reranker → top 5</text>

<!-- Qdrant -->
<rect x="420" y="192" width="165" height="60" rx="8" stroke-width="0.5" class="c-blue-fill"/>
<text class="th c-blue-text" x="502" y="214" text-anchor="middle" dominant-baseline="central">Qdrant</text>
<text class="ts c-blue-text" x="502" y="234" text-anchor="middle" dominant-baseline="central">int8 quantized · :6333</text>

<!-- Docstore (Postgres) -->
<rect x="595" y="192" width="165" height="60" rx="8" stroke-width="0.5" class="c-amber-fill"/>
<text class="th c-amber-text" x="677" y="214" text-anchor="middle" dominant-baseline="central">Document store</text>
<text class="ts c-amber-text" x="677" y="234" text-anchor="middle" dominant-baseline="central">Postgres · :5432</text>

<!-- Arrow RAG proxy → Qdrant -->
<line x1="390" y1="222" x2="418" y2="222" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Arrow RAG proxy → docstore -->
<line x1="390" y1="244" x2="593" y2="244" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Arrow RAG proxy → model -->
<line x1="210" y1="292" x2="210" y2="328" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts muted" x="225" y="312" dominant-baseline="central">:8080</text>

<!-- RamaLama dashed container -->
<rect x="24" y="314" width="378" height="120" rx="6" fill="none" stroke-dasharray="4 3" stroke-width="0.5" stroke="#888780"/>
<text class="tl muted" x="37" y="307" dominant-baseline="central">RamaLama · ROCm · q8_0 KV cache</text>

<!-- Qwen model -->
<rect x="42" y="328" width="344" height="92" rx="8" stroke-width="0.5" class="c-teal-fill"/>
<text class="th c-teal-text" x="214" y="352" text-anchor="middle" dominant-baseline="central">Qwen3.5-35B-A3B</text>
<text class="ts c-teal-text" x="214" y="374" text-anchor="middle" dominant-baseline="central">MoE · 3B active params · ~22 GB</text>
<text class="ts c-teal-text" x="214" y="394" text-anchor="middle" dominant-baseline="central">thinking + non-thinking · ctx 131072</text>

<!-- Arrow model → GPU -->
<line x1="210" y1="434" x2="210" y2="464" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- GPU layer -->
<rect x="30" y="466" width="730" height="56" rx="8" stroke-width="0.5" class="c-green-fill"/>
<text class="th c-green-text" x="395" y="488" text-anchor="middle" dominant-baseline="central">AMD Ryzen AI Max+ 395 · gfx1151 · ROCm</text>
<text class="ts c-green-text" x="395" y="508" text-anchor="middle" dominant-baseline="central">64 GB VRAM + 64 GB GTT · 62 GB system RAM</text>

<!-- Separator -->
<line x1="30" y1="542" x2="760" y2="542" stroke-dasharray="3 3" stroke-width="0.5" stroke="#888780"/>

<!-- Bottom row -->
<rect x="30"  y="556" width="170" height="54" rx="8" stroke-width="0.5" class="c-gray-fill"/>
<text class="th c-gray-text" x="115" y="577" text-anchor="middle" dominant-baseline="central">Open WebUI</text>
<text class="ts c-gray-text" x="115" y="596" text-anchor="middle" dominant-baseline="central">v0.8.6 · :3000</text>

<rect x="215" y="556" width="170" height="54" rx="8" stroke-width="0.5" class="c-gray-fill"/>
<text class="th c-gray-text" x="300" y="577" text-anchor="middle" dominant-baseline="central">UBI9 · UBI10</text>
<text class="ts c-gray-text" x="300" y="596" text-anchor="middle" dominant-baseline="central">SELinux enforcing</text>

<rect x="400" y="556" width="175" height="54" rx="8" stroke-width="0.5" class="c-gray-fill"/>
<text class="th c-gray-text" x="487" y="577" text-anchor="middle" dominant-baseline="central">Fedora 43</text>
<text class="ts c-gray-text" x="487" y="596" text-anchor="middle" dominant-baseline="central">Podman quadlets</text>

<rect x="590" y="556" width="170" height="54" rx="8" stroke-width="0.5" class="c-gray-fill"/>
<text class="th c-gray-text" x="675" y="577" text-anchor="middle" dominant-baseline="central">systemd</text>
<text class="ts c-gray-text" x="675" y="596" text-anchor="middle" dominant-baseline="central">rootless user services</text>

</svg>
